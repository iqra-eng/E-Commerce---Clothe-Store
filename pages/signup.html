<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Create a LUXE account to start shopping premium fashion and track your orders." />
  <title>Sign Up — LUXE</title>
  <link rel="stylesheet" href="../cssFile/globalStyles.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <a href="../index.html">LUXE</a>
    <button class="menu-toggle" aria-label="Toggle menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <ul>
      <li><a href="../index.html">Home</a></li>
      <li><a href="products.html">Shop</a></li>
      <li><a href="services.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="cart.html">🛍 Cart <span id="cart-count" class="cart-badge">0</span></a></li>
      <li><button id="theme-toggle" class="sm-button border-button">☾ Dark</button></li>
    </ul>
  </nav>

  <!-- PAGE -->
  <div class="page auth-page">

    <div class="form-container signup-form-container">

      <div class="form-header">
        <h4>Join LUXE</h4>
        <h2>Create Your Account</h2>
        <p>Already have an account? <a href="login.html" class="auth-link">Sign in</a></p>
      </div>

      <form id="signup-form" onsubmit="handleSignup(event)">

        <div class="form-row">
          <div class="form-row-col">
            <label for="first-name">First Name</label>
            <input type="text" id="first-name" name="firstName" placeholder="Iqra" required />
          </div>
          <div class="form-row-col">
            <label for="last-name">Last Name</label>
            <input type="text" id="last-name" name="lastName" placeholder="Ahmed" required />
          </div>
        </div>

        <div>
          <label for="signup-email">Email Address</label>
          <input type="email" id="signup-email" name="email" placeholder="you@example.com" required />
        </div>

        <div>
          <label for="signup-phone">Phone Number</label>
          <input type="tel" id="signup-phone" name="phone" placeholder="+92 300 0000000" />
        </div>

        <div>
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" name="password" placeholder="Minimum 8 characters" required />
        </div>

        <div>
          <label for="signup-confirm">Confirm Password</label>
          <input type="password" id="signup-confirm" name="confirm" placeholder="Re-enter your password" required />
        </div>

        <div class="terms-row">
          <input type="checkbox" id="agree-terms" class="checkbox-auto" required />
          <label for="agree-terms" class="terms-label">
            I agree to the <a href="#" class="auth-link">Terms of Service</a> and <a href="#" class="auth-link">Privacy Policy</a>
          </label>
        </div>

        <button type="submit" class="lg-button btn-full">Create Account</button>
      </form>

    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="footer-bottom footer-minimal">
      <p>© 2026 LUXE. All rights reserved.</p>
    </div>
  </footer>

  <script src="../jsFile/jsFunctions.js"></script>
  <script>
    function handleSignup(e) {
      e.preventDefault();
      const pwd     = document.getElementById('signup-password').value;
      const confirm = document.getElementById('signup-confirm').value;
      if (pwd !== confirm) {
        showToast('Passwords do not match.', 'error');
        return;
      }
      if (!validateRequired('signup-form')) return;
      showToast('Account created! Redirecting…');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1400);
    }
  </script>
</body>
</html>
