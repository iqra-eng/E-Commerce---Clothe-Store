<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Create a LUXE account to start shopping premium fashion and track your orders." />
  <title>Sign Up — LUXE</title>
  <link rel="stylesheet" href="../cssFile/globalStyles.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <a href="../index.html">LUXE</a>
    <button class="menu-toggle" aria-label="Toggle menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <ul>
      <li><a href="../index.html">Home</a></li>
      <li><a href="products.html">Shop</a></li>
      <li><a href="services.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="cart.html">🛍 Cart <span id="cart-count" style="display:none;background:var(--brand-third-color);color:#fff;font-size:0.6rem;font-weight:700;border-radius:50%;width:17px;height:17px;display:inline-flex;align-items:center;justify-content:center;">0</span></a></li>
      <li><button id="theme-toggle" class="sm-button border-button">☾ Dark</button></li>
    </ul>
  </nav>

  <!-- PAGE -->
  <div class="page" style="min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;">

    <div class="form-container" style="max-width:520px;">

      <div style="text-align:center;margin-bottom:32px;">
        <h4 style="margin-bottom:6px;">Join LUXE</h4>
        <h2>Create Your Account</h2>
        <p style="margin-top:8px;font-size:0.85rem;">Already have an account? <a href="login.html" style="color:var(--brand-third-color);font-weight:600;border-bottom:1px solid var(--brand-third-color);">Sign in</a></p>
      </div>

      <form id="signup-form" onsubmit="handleSignup(event)">

        <div style="display:flex;gap:14px;flex-wrap:wrap;">
          <div style="flex:1;min-width:160px;">
            <label for="first-name">First Name</label>
            <input type="text" id="first-name" name="firstName" placeholder="Iqra" required />
          </div>
          <div style="flex:1;min-width:160px;">
            <label for="last-name">Last Name</label>
            <input type="text" id="last-name" name="lastName" placeholder="Ahmed" required />
          </div>
        </div>

        <div>
          <label for="signup-email">Email Address</label>
          <input type="email" id="signup-email" name="email" placeholder="you@example.com" required />
        </div>

        <div>
          <label for="signup-phone">Phone Number</label>
          <input type="tel" id="signup-phone" name="phone" placeholder="+92 300 0000000" />
        </div>

        <div>
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" name="password" placeholder="Minimum 8 characters" required />
        </div>

        <div>
          <label for="signup-confirm">Confirm Password</label>
          <input type="password" id="signup-confirm" name="confirm" placeholder="Re-enter your password" required />
        </div>

        <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:20px;">
          <input type="checkbox" id="agree-terms" style="width:auto;margin-top:2px;" required />
          <label for="agree-terms" style="text-transform:none;letter-spacing:0;font-size:0.82rem;font-weight:400;color:var(--text-secondary-color);cursor:pointer;">
            I agree to the <a href="#" style="color:var(--brand-third-color);border-bottom:1px solid var(--brand-third-color);">Terms of Service</a> and <a href="#" style="color:var(--brand-third-color);border-bottom:1px solid var(--brand-third-color);">Privacy Policy</a>
          </label>
        </div>

        <button type="submit" style="width:100%;" class="lg-button">Create Account</button>
      </form>

    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="footer-bottom" style="border-top:1px solid rgba(245,245,240,0.12);padding-top:24px;max-width:1280px;margin:0 auto;">
      <p>© 2026 LUXE. All rights reserved.</p>
    </div>
  </footer>

  <script src="../jsFile/jsFunctions.js"></script>
  <script>
    function handleSignup(e) {
      e.preventDefault();
      const pwd     = document.getElementById('signup-password').value;
      const confirm = document.getElementById('signup-confirm').value;
      if (pwd !== confirm) {
        showToast('Passwords do not match.', 'error');
        return;
      }
      if (!validateRequired('signup-form')) return;
      showToast('Account created! Redirecting…');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1400);
    }
  </script>
</body>
</html>
