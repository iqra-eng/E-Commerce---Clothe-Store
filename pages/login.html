<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Login to your LUXE account to access your orders, wishlist and profile." />
  <title>Login — LUXE</title>
  <link rel="stylesheet" href="../cssFile/globalStyles.css" />
</head>
<body>

  <nav>
    <a href="../index.html">LUXE</a>
    <button class="menu-toggle" aria-label="Toggle menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <ul>
      <li><a href="../index.html">Home</a></li>
      <li><a href="products.html">Shop</a></li>
      <li><a href="services.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="cart.html">🛍 Cart <span id="cart-count" class="cart-badge">0</span></a></li>
      <li><button id="theme-toggle" class="sm-button border-button">☾ Dark</button></li>
    </ul>
  </nav>

  <div class="page auth-page">
    <div class="form-container">
      <div class="form-header">
        <h4>Welcome Back</h4>
        <h2>Sign In to LUXE</h2>
        <p>Don't have an account? <a href="signup.html" class="auth-link">Create one</a></p>
      </div>

      <form id="login-form" onsubmit="handleLogin(event)">
        <div>
          <label for="login-email">Email Address</label>
          <input type="email" id="login-email" name="email" placeholder="you@example.com" required />
        </div>
        <div>
          <label for="login-password">Password</label>
          <input type="password" id="login-password" name="password" placeholder="Enter your password" required />
        </div>
        <div class="remember-row">
          <label class="remember-label">
            <input type="checkbox" id="remember-me" class="checkbox-auto" />
            Remember me
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>
        <button type="submit" class="lg-button btn-full">Sign In</button>
      </form>

      <div class="or-divider">
        <div class="or-line"></div>
        <span class="or-text">OR</span>
        <div class="or-line"></div>
      </div>

      <div class="social-btns">
        <button class="border-button btn-full" onclick="showToast('Google login coming soon')">
          <span>G</span> Continue with Google
        </button>
      </div>
    </div>
  </div>

  <footer>
    <div class="footer-bottom footer-minimal">
      <p>© 2026 LUXE. All rights reserved.</p>
    </div>
  </footer>

  <script src="../jsFile/jsFunctions.js"></script>
  <script>
    function handleLogin(e) {
      e.preventDefault();
      if (!validateRequired('login-form')) return;
      showToast('Logging you in…');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
    }
  </script>
</body>
</html>
